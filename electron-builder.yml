appId: com.opensearch.dashboards-desktop
productName: OpenSearch Dashboards Desktop
copyright: Copyright © 2026 OpenSearch Contributors

directories:
  output: dist
  buildResources: build

files:
  - dist/**/*
  - package.json

asar: true
compression: maximum

# macOS
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false # Set to true when Apple credentials are configured

dmg:
  sign: false

# Windows
win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  # certificateSubjectName and certificateSha1 set via env vars in CI

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# Linux
linux:
  maintainer: "Seraph Jiang <seraphjiang@gmail.com>"
  category: Development
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
    - target: rpm
      arch: [x64, arm64]

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libsecret-1-0 # For safeStorage/keychain

rpm:
  depends:
    - gtk3
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - xdg-utils
    - at-spi2-core
    - libsecret # For safeStorage/keychain

# Auto-update (configured in M4, placeholder)
publish:
  provider: github
  owner: opensearch-project
  repo: dashboards-desktop

# Native module rebuild
electronDownload:
  cache: .cache/electron

npmRebuild: true
nodeGypRebuild: false
buildDependenciesFromSource: false
