name: PR Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild better-sqlite3
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/

  test-renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm rebuild better-sqlite3
      - run: npm run test:renderer

  native-module-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Rebuild native modules for Node.js
        run: npm rebuild better-sqlite3 --build-from-source
      - name: Verify better-sqlite3 loads
        run: node -e "const db = require('better-sqlite3')(':memory:'); db.exec('CREATE TABLE t(id INTEGER)'); db.prepare('INSERT INTO t VALUES(1)').run(); const r = db.prepare('SELECT * FROM t').get(); if(r.id !== 1) throw new Error('SQLite smoke test failed'); console.log('✅ better-sqlite3 smoke test passed');"

  build:
    needs: [lint, typecheck, test-unit, test-renderer, native-module-smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:ts
      - run: npx electron-builder --linux --x64 --dir
      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-x64
          path: dist/linux-unpacked/
          retention-days: 7
